---
name: pull-request

on:
  pull_request

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  DependenciesAnalysis:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: run osv-scanner on PR branch
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --format sarif
            --output DependenciesAnalysisAfter.sarif
            ./
        continue-on-error: true

      - name: checkout baseline commit
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}

      - name: run osv-scanner on base branch
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --format sarif
            --output DependenciesAnalysisBefore.sarif
            ./
        continue-on-error: true

      - name: compare analysis
        uses: google/osv-scanner-action/osv-reporter-action@v2.3.5
        with:
          scan-args: |-
            --output-files=sarif:DependenciesAnalysisDiff.sarif
            --old=DependenciesAnalysisBefore.sarif
            --new=DependenciesAnalysisAfter.sarif

      - name: save differential report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DependenciesAnalysisDiff
          path: DependenciesAnalysisDiff.sarif

  SourceCodeAnalysis:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: run semgrep differential analysis
        run: semgrep scan --error --config .semgrep --sarif --output SourceCodeAnalysisDiff.sarif --baseline-commit ${{ github.event.pull_request.base.sha }} .

      - name: save differential report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SourceCodeAnalysisDiff
          path: SourceCodeAnalysisDiff.sarif
